# render.yaml — Render.com Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

services:
  # ============================================
  # Backend API (Web Service)
  # ============================================
  - type: web
    name: northlink-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: |
      cd backend && pip install uv && uv sync --frozen --no-dev
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: northlink-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          name: northlink-redis
          type: redis
          property: connectionURI
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ============================================
  # Frontend (Static Site)
  # ============================================
  - type: web
    name: northlink-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: northlink-api
          type: web
          property: host
      - key: NODE_VERSION
        value: "20"

databases:
  # ============================================
  # PostgreSQL Database
  # ============================================
  - name: northlink-db
    plan: starter
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: [] # Only internal access

  # ============================================
  # Redis Cache
  # ============================================
  - name: northlink-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Only internal access
